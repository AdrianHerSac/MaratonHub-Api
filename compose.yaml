services:
  maratonhub.api:
    image: maratonhub.api
    build:
      context: .
      dockerfile: MaratonHub.Api/Dockerfile
    ports:
      - "5084:8080"
    depends_on:
      - mongodb
      - redis 
    environment:
      - ConnectionStrings__PostgreSql=Host=postgres;Port=5432;Database=maratonhubdb;Username=postgres;Password=password123
      - ConnectionStrings__Redis=redis:6379,password=${REDIS_PASSWORD}
    
  postgres:
    image: postgres:latest
    container_name: postgres_maratonhub
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=maratonhubdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:7-alpine
    restart: always
    env_file: .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT}:6379"

volumes:
  postgres_data:
  redis-data: 